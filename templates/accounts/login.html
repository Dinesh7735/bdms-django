{% extends 'base/base.html' %}

{% block title %}
    Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="text-center mb-4">Login</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Email</label>
                        {{ form.email }}
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
